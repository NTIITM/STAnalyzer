version: '3.8'

services:
  giotto-cpdb-service:
    image: giotto-cpdb-service:latest
    build:
      context: ../..
      dockerfile: services/giotto-cpdb-service/Dockerfile
    container_name: giotto-cpdb-service
    ports:
      - "50239:8080"
    environment:
      - PORT=8080
      - OUTPUT_DIR=/app/outputs
    volumes:
      - ./outputs:/app/outputs
      - .:/app
    networks:
      - services-network
    restart: unless-stopped

networks:
  services-network:
    driver: bridge
# Nginx 配置 - SSE 流式传输修复方案
# 基于你现有的配置，添加了禁用缓冲的配置

# ============================================
# 方案 A（推荐）：精确匹配 SSE 端点
# ============================================
# 将以下配置放在通用 location /STA-MAS/api/ 之前
# Nginx 会优先匹配更精确的规则

location ~ ^/STA-MAS/api/(analysis|agent)/.*stream {
    # 去掉前缀 /STA-MAS，把 /STA-MAS/api/xxx 变成 /api/xxx
    rewrite ^/STA-MAS/api/(.*)$ /api/$1 break;
    
    # ===== 关键配置：禁用缓冲 =====
    proxy_buffering off;
    proxy_cache off;
    
    # 设置必要的请求头
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    
    # 禁用读取超时，允许长连接（SSE 需要长连接）
    proxy_read_timeout 24h;
    proxy_connect_timeout 60s;
    proxy_send_timeout 24h;
    
    # 后端 textMSA 服务
    proxy_pass http://sdu-205:8000;
    
    # 允许大文件上传
    client_max_body_size 500m;
}

# ============================================
# 通用 API 代理配置（保留你原有的配置）
# ============================================
location /STA-MAS/api/ {
    # 去掉前缀 /STA-MAS，把 /STA-MAS/api/user/login 变成 /api/user/login
    rewrite ^/STA-MAS/api/(.*)$ /api/$1 break;
    
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    
    # 后端 textMSA 服务（按你真实地址改）
    proxy_pass http://sdu-205:8000;
    
    client_max_body_size 500m;
}


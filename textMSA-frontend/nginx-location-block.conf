# 直接可用的 location 配置块
# 将以下 location 块添加到你的 Nginx server 配置中
# 注意：SSE 专用的 location 要放在通用 location 之前

# ============================================
# 1. SSE 流式端点专用配置（放在前面，优先匹配）
# ============================================
location ~ ^/STA-MAS/api/(analysis|agent)/.*stream {
    # 去掉前缀 /STA-MAS，把 /STA-MAS/api/xxx 变成 /api/xxx
    rewrite ^/STA-MAS/api/(.*)$ /api/$1 break;
    
    # ===== 关键：禁用缓冲，确保流式传输 =====
    proxy_buffering off;
    proxy_cache off;
    
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    
    # 长超时时间（SSE 需要长连接）
    proxy_read_timeout 24h;
    proxy_connect_timeout 60s;
    proxy_send_timeout 24h;
    
    # 后端 textMSA 服务
    proxy_pass http://sdu-205:8000;
    
    client_max_body_size 500m;
}

# ============================================
# 2. 通用 API 代理配置
# ============================================
location /STA-MAS/api/ {
    # 去掉前缀 /STA-MAS，把 /STA-MAS/api/user/login 变成 /api/user/login
    rewrite ^/STA-MAS/api/(.*)$ /api/$1 break;
    
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    
    # 后端 textMSA 服务（按你真实地址改）
    proxy_pass http://sdu-205:8000;
    
    client_max_body_size 500m;
}

# ============================================
# 3. 静态文件服务配置
# ============================================
location /STA-MAS {
    alias /usr/local/nginx/html_sta_mas;
    index index.html;
    # ✅ 修复：使用相对路径，相对于 alias 目录
    try_files $uri $uri/ /STA-MAS/index.html;
}


server {
    listen 80;
    server_name _;

    client_max_body_size 500m;

    location ~ ^/STAnalyzer/api/(analysis|agent)/.*stream {
        rewrite ^/STAnalyzer/api/(.*)$ /api/$1 break;

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 24h;
        proxy_connect_timeout 60s;
        proxy_send_timeout 24h;

        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_pass http://textmsa-api:8000;
    }

    location /STAnalyzer/api/ {
        rewrite ^/STAnalyzer/api/(.*)$ /api/$1 break;

        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_pass http://textmsa-api:8000;
    }

    location /STAnalyzer/ {
        alias /usr/share/nginx/html/STAnalyzer/;
        index index.html;
        try_files $uri $uri/ /STAnalyzer/index.html;
    }

    location = / {
        return 302 /STAnalyzer/;
    }
}

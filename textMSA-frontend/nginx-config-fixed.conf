# Nginx 配置 - 修复 SSE 流式传输问题
# 这个配置需要添加到你的 Nginx 配置文件中，特别是处理 /STA-MAS/api 的 location 块

# 方法1: 针对所有 SSE 端点禁用缓冲
location ~ ^/STA-MAS/api/(analysis|agent)/.*stream {
    # 禁用代理缓冲 - 这是关键配置
    proxy_buffering off;
    proxy_cache off;
    
    # 设置必要的响应头
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    
    # 禁用读取超时，允许长连接
    proxy_read_timeout 24h;
    proxy_connect_timeout 60s;
    proxy_send_timeout 24h;
    
    # 禁用 HTTP/2，使用 HTTP/1.1（某些情况下 HTTP/2 可能导致缓冲）
    # 注意：如果使用 HTTP/2，确保后端也支持流式传输
    
    # 传递原始请求头
    proxy_pass_request_headers on;
    
    # 后端地址（根据实际情况修改）
    proxy_pass http://127.0.0.1:8000;
    
    # 或者如果后端在其他服务器
    # proxy_pass http://sdu-205:8000;
}


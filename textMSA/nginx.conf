    server {
        listen       7007;
        server_name  mclusttool;
        sendfile  on;
        keepalive_timeout  3600;
	client_body_buffer_size 100m;
        client_max_body_size 20000m;
        proxy_send_timeout 3600;
        proxy_read_timeout 3600;
        proxy_connect_timeout 3600;

        ssl on;

	error_log logs/server1.log debug; #cat nginx/log/server1.log        
        
        # 参见/opt/lampp/etc/extra/ httpd-ssl.conf
        #ssl证书的pem文件路径
        ssl_certificate  /root/ssl/251211/sdu-idea.cn.pem;
        
        #ssl证书的key文件路径
        ssl_certificate_key /root/ssl/251211/sdu-idea.cn.key;
        
        
        #charset koi8-r;

        # access_log  logs/host.access.log  main;

        location / {
            root   html_mclustTool;
            index  index.html index.htm;
            add_header 'Access-Control-Allow-Origin' '*';
            	client_body_buffer_size 100m;
        	client_max_body_size 20000m;
        }
        
   	location /api/ {
    			proxy_set_header Host $http_host;
    			proxy_set_header X-Real-IP $remote_addr;
    			proxy_set_header REMOTE-HOST $remote_addr;
    			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    			#proxy_pass https://8.130.160.80:7008/;
			#rewrite    ^(.*)api/(.*)$   https://8.130.160.80:7008/$2;
			rewrite    ^(.*)api/(.*)$   $1$2; break;
            		proxy_pass   https://8.130.160.80:7008/;
			client_body_buffer_size 100m;
        		client_max_body_size 20000m;
    		}


        #error_page  404              /404.html;

        # redirect server error pages to the static page /50x.html
        #
        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   html_isotool;
        }


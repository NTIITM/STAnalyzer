      # ============================================
      # 1. SSE 流式端点专用配置（放在前面，优先匹配）
      # ============================================
      location ~ ^/STA-MAS/api/(analysis|agent)/.*stream {
          # 去掉前缀 /STA-MAS，把 /STA-MAS/api/xxx 变成 /api/xxx
          rewrite ^/STA-MAS/api/(.*)$ /api/$1 break;
          
          # ===== 关键：禁用缓冲，确保流式传输 =====
          proxy_buffering off;
          proxy_cache off;
          
          proxy_set_header Host $http_host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          
          # 长超时时间（SSE 需要长连接）
          proxy_read_timeout 24h;
          proxy_connect_timeout 60s;
          proxy_send_timeout 24h;
          
          # 后端 textMSA 服务
          proxy_pass http://sdu-205:8000;
          
          client_max_body_size 500m;
      }
      
      # ============================================
      # 2. 通用 API 代理配置
      # ============================================
      location /STA-MAS/api/ {
          # 去掉前缀 /STA-MAS，把 /STA-MAS/api/user/login 变成 /api/user/login
          rewrite ^/STA-MAS/api/(.*)$ /api/$1 break;
          
          proxy_set_header Host $http_host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          
          # 后端 textMSA 服务（按你真实地址改）
          proxy_pass http://sdu-205:8000;
          
          client_max_body_size 500m;
      }
      
      # ============================================
      # 3. 静态文件服务配置
      # ============================================
      location /STA-MAS {
          alias /usr/local/nginx/html_sta_mas;
          index index.html;
          # ✅ 修复：使用相对路径，相对于 alias 目录
          try_files $uri $uri/ /STA-MAS/index.html;
      }
        
    # GP Benchmark SSE 流式端点
    location ~ ^/GPBench/api/agent {
        rewrite ^/GPBench/api/(.*)$ /api/$1 break;
        
        proxy_buffering off;
        proxy_cache off;
        
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_read_timeout 24h;
        proxy_connect_timeout 60s;
        proxy_send_timeout 24h;
        
        proxy_pass http://sdu-112:10000;
        
        client_max_body_size 500m;
    }
    
    location /GPBench/api/task {
        rewrite ^/GPBench/api/(.*)$ /api/$1 break;
        
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_pass http://sdu-112:10000;
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
        
        client_max_body_size 500m;
        client_body_buffer_size 256k;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
    
    
    # GP Benchmark 静态文件服务
    location /GPBench {
        alias /usr/local/nginx/html_gpbenchmark;
        index index.html;
        try_files $uri $uri/ /GPBench/index.html;
    }
    


      

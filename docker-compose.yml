services:
  mongodb:
    image: mongo:8.0
    container_name: textmsa-mongodb
    restart: unless-stopped
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10

  system-server:
    build:
      context: ./system_server
      dockerfile: Dockerfile
    container_name: textmsa-system-server
    restart: unless-stopped
    environment:
      API_HOST: 0.0.0.0
      API_PORT: 9000
      SERVICES_DIR: /app/services
      SERVICES_CONFIG_PATH: /app/services_config.json
      TEXTMSA_PROJECT_ROOT: /workspace/textMSA
      SERVICE_RUN_MODE: "${SERVICE_RUN_MODE:-process}"
      AUTO_START_SERVICES: "${AUTO_START_SERVICES:-false}"
      STOP_SERVICES_ON_SHUTDOWN: "${STOP_SERVICES_ON_SHUTDOWN:-false}"
      DOCKER_BUILD_ON_START: "${DOCKER_BUILD_ON_START:-false}"
      DOCKER_INCLUDE_SERVER: "false"
    ports:
      - "${SYSTEM_SERVER_PORT:-9000}:9000"
    volumes:
      - ./textMSA:/workspace/textMSA:ro
      - ./system_server/services:/app/services
      - ./system_server/services_config.json:/app/services_config.json
      - system_server_logs:/app/logs
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 15s
      timeout: 5s
      retries: 10

  textmsa-api:
    build:
      context: ./textMSA
      dockerfile: Dockerfile
    container_name: textmsa-api
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      system-server:
        condition: service_healthy
    ports:
      - "${TEXTMSA_API_PORT:-8000}:8000"
    volumes:
      - ./textMSA/textmsa/config/config.docker.json:/app/textmsa/config/config.json:ro
      - textmsa_runtime:/app/runtime
      - textmsa_logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  frontend:
    build:
      context: ./textMSA-frontend
      dockerfile: Dockerfile
    container_name: textmsa-frontend
    restart: unless-stopped
    depends_on:
      textmsa-api:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-8080}:80"

volumes:
  mongodb_data:
  mongodb_config:
  system_server_logs:
  textmsa_runtime:
  textmsa_logs:
